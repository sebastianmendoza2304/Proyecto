<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Docente</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <img src="escudo-unilibre.png" alt="Escudo Universidad Libre de Colombia" class="logo">
    <h2>Panel Docente</h2>
  </div>

  <!-- Formulario de reporte -->
  <div class="login-container" style="width:600px;">
    <h3>Registrar Reporte de Riesgo Académico</h3>
    <form id="formReporte">
      <label>Estudiante:</label>
      <input type="text" id="estudiante" placeholder="Nombre del estudiante" required>

      <label>Materia:</label>
      <input type="text" id="materia" required>

      <label>Motivo:</label>
      <select id="motivo">
        <option value="Bajo rendimiento">Bajo rendimiento</option>
        <option value="Inasistencia">Inasistencia</option>
        <option value="Seguimiento">Seguimiento</option>
      </select>

      <label>Observaciones:</label>
      <textarea id="observaciones" rows="4"></textarea>

      <button type="submit">Registrar Reporte</button>
    </form>
  </div>

  <!-- Consulta de casos -->
  <div class="login-container" style="width:600px;">
    <h3>Mis Reportes</h3>
    <table border="1" width="100%" id="tablaReportes">
      <tr>
        <th>Estudiante</th>
        <th>Materia</th>
        <th>Motivo</th>
        <th>Estado</th>
        <th>Fecha</th>
      </tr>
    </table>
  </div>

  <a href="index.html" class="volver">Cerrar sesión</a>

  <script>
    // Simulación de almacenamiento en localStorage
    const form = document.getElementById("formReporte");
    const tabla = document.getElementById("tablaReportes");

    // Cargar reportes previos
    let reportes = JSON.parse(localStorage.getItem("reportes")) || [];

    function mostrarReportes() {
      // limpiar filas viejas
      tabla.innerHTML = `
        <tr>
          <th>Estudiante</th>
          <th>Materia</th>
          <th>Motivo</th>
          <th>Estado</th>
          <th>Fecha</th>
        </tr>`;
      reportes.forEach(r => {
        const fila = document.createElement("tr");
        fila.innerHTML = `
          <td>${r.estudiante}</td>
          <td>${r.materia}</td>
          <td>${r.motivo}</td>
          <td>${r.estado}</td>
          <td>${r.fecha}</td>
        `;
        tabla.appendChild(fila);
      });
    }

    mostrarReportes();

    form.addEventListener("submit", e => {
      e.preventDefault();
      const estudiante = document.getElementById("estudiante").value;
      const materia = document.getElementById("materia").value;
      const motivo = document.getElementById("motivo").value;
      const observaciones = document.getElementById("observaciones").value;
      const fecha = new Date().toLocaleString();

      const nuevoReporte = {
        estudiante,
        materia,
        motivo,
        observaciones,
        fecha,
        estado: "Reportado"
      };

      reportes.push(nuevoReporte);
      localStorage.setItem("reportes", JSON.stringify(reportes));
      mostrarReportes();
      form.reset();
      alert("Reporte registrado correctamente.");
    });
  </script>
</body>
</html>
