<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Docente</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <h2>Panel Docente</h2>
  </div>

  <div class="login-container" style="width:600px;">
    <h3>Registrar Reporte de Riesgo Académico</h3>
    <form onsubmit="registrarReporte(
      document.getElementById('estudiante').value,
      document.getElementById('materia').value,
      document.getElementById('motivo').value,
      document.getElementById('observaciones').value,
      localStorage.getItem('nombreUsuario')
    ); mostrarReportesDocente('tablaReportes'); return false;">
      <label>Estudiante:</label>
      <input type="text" id="estudiante" required>
      <label>Materia:</label>
      <input type="text" id="materia" required>
      <label>Motivo:</label>
      <select id="motivo">
        <option value="Bajo rendimiento">Bajo rendimiento</option>
        <option value="Inasistencia">Inasistencia</option>
        <option value="Seguimiento">Seguimiento</option>
      </select>
      <label>Observaciones:</label>
      <textarea id="observaciones"></textarea>
      <button type="submit">Registrar Reporte</button>
    </form>
  </div>

  <div class="login-container" style="width:600px;">
    <h3>Mis Reportes</h3>
    <table id="tablaReportes" border="1" width="100%"></table>
  </div>

  <a href="index.html">Cerrar sesión</a>

  <script src="docente.js"></script>
  <script>
    mostrarReportesDocente("tablaReportes");
  </script>
</body>
</html>
