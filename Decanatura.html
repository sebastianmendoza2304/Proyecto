<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Decanatura - Sistema de Alertas</title>
  <link rel="stylesheet" href="Style.css">
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; }

    .header { display:flex; align-items:center; gap:16px; justify-content:center;
      background: linear-gradient(135deg,#ab1313,#f57c00); color:#fff; padding:16px 24px; }
    .header img { width:54px; height:54px; border-radius:50%; border:2px solid rgba(255,255,255,0.5); }
    .header-info h1 { margin:0; font-size:1.2rem; font-weight:600; }
    .header-info p  { margin:0; font-size:0.82rem; opacity:0.85; }
    .header-right { margin-left:auto; }
    .btn-logout { background:rgba(255,255,255,0.18); color:#fff; border:1px solid rgba(255,255,255,0.4);
      padding:7px 16px; border-radius:6px; cursor:pointer; font-size:0.85rem; text-decoration:none; }

    .main { max-width:1200px; margin:28px auto; padding:0 16px; }

    /* Stats */
    .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:24px; }
    .stat-card { background:#fff; border-radius:10px; padding:16px 12px; text-align:center;
      box-shadow:0 1px 4px rgba(0,0,0,0.08); }
    .stat-num { font-size:2rem; font-weight:700; color:#b71c1c; }
    .stat-label { font-size:0.78rem; color:#888; margin-top:2px; }

    /* Notificaciones */
    .notif-panel { background:#fff; border-radius:12px; padding:20px 24px; margin-bottom:20px;
      box-shadow:0 1px 4px rgba(0,0,0,0.09); }
    .notif-panel h2 { margin:0 0 14px; font-size:1.05rem; color:#b71c1c;
      border-left:4px solid #f57c00; padding-left:10px; }
    .notif-list { display:flex; flex-direction:column; gap:8px; max-height:160px; overflow-y:auto; }
    .notif-item { display:flex; align-items:center; gap:10px; padding:9px 14px;
      border-radius:7px; font-size:0.87rem; }
    .notif-nuevo   { background:#fff3cd; color:#856404; }
    .notif-cerrado { background:#d4edda; color:#155724; }
    .notif-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .dot-nuevo   { background:#ffc107; }
    .dot-cerrado { background:#28a745; }
    .notif-vacia { color:#aaa; font-size:0.88rem; }

    /* Card tabla */
    .card { background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,0.09); padding:24px; }
    .card h2 { margin:0 0 18px; font-size:1.05rem; color:#b71c1c;
      border-left:4px solid #f57c00; padding-left:10px; }

    /* Filtros */
    .filtros { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; margin-bottom:18px; }
    .filtros input,
    .filtros select { padding:8px 12px; border:1.5px solid #ddd; border-radius:7px;
      font-size:0.88rem; font-family:inherit; background:#fafafa; }
    .filtros input:focus,
    .filtros select:focus { outline:none; border-color:#b71c1c; }
    .filtros-actions { display:flex; gap:8px; align-items:center; }
    .btn { padding:9px 18px; border:none; border-radius:7px; cursor:pointer;
      font-weight:600; font-size:0.88rem; font-family:inherit; transition:all 0.2s; }
    .btn-primary { background:#b71c1c; color:#fff; }
    .btn-primary:hover { background:#f57c00; }
    .btn-secondary { background:#f5f5f5; color:#555; border:1.5px solid #ddd; }
    .btn-secondary:hover { background:#ffe0b2; }

    /* Tabla */
    .tabla-wrapper { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:0.88rem; }
    thead tr { background:linear-gradient(135deg,#b71c1c,#f57c00); color:#fff; }
    th { padding:11px 14px; text-align:left; font-weight:600; font-size:0.78rem; text-transform:uppercase; letter-spacing:0.04em; }
    td { padding:11px 14px; border-bottom:1px solid #f0f0f0; color:#444; vertical-align:middle; }
    tr:hover td { background:#fff8f0; }
    .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:0.75rem; font-weight:600; }
    .badge-reportado    { background:#fff3cd; color:#856404; }
    .badge-revision     { background:#cce5ff; color:#004085; }
    .badge-seguimiento  { background:#d4edda; color:#155724; }
    .badge-remitido     { background:#f8d7da; color:#721c24; }
    .badge-cerrado      { background:#e2e3e5; color:#383d41; }

    /* Modal detalle */
    .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:100;
      align-items:center; justify-content:center; }
    .modal-bg.open { display:flex; }
    .modal { background:#fff; border-radius:14px; padding:28px; width:100%; max-width:580px;
      box-shadow:0 8px 32px rgba(0,0,0,0.18); max-height:90vh; overflow-y:auto; }
    .modal h3 { margin:0 0 16px; color:#b71c1c; font-size:1rem; }
    .detalle-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .detalle-item { background:#f9f9f9; border-radius:8px; padding:12px; }
    .detalle-item.full { grid-column:1/-1; }
    .detalle-label { font-size:0.75rem; color:#999; text-transform:uppercase; font-weight:600; margin-bottom:4px; }
    .detalle-val { font-size:0.93rem; color:#333; }
    .modal-actions { margin-top:18px; display:flex; justify-content:flex-end; gap:10px; }

    /* Exportar */
    .top-actions { display:flex; justify-content:flex-end; margin-bottom:14px; }

    @media(max-width:600px) { .filtros { grid-template-columns:1fr; } }
  </style>
</head>
<body>

<div class="header">
  <img src="escudo-unilibre.png" alt="Universidad Libre">
  <div class="header-info">
    <h1>Panel Decanatura</h1>
    <p id="nombreHeader">Sistema de Alertas Académicas</p>
  </div>
  <div class="header-right">
    <a href="index.html" class="btn-logout" onclick="cerrarSesion()">Cerrar sesión</a>
  </div>
</div>

<div class="main">

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="statTotal">—</div>
      <div class="stat-label">Total casos</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statNuevos">—</div>
      <div class="stat-label">Nuevos</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statEnProceso">—</div>
      <div class="stat-label">En proceso</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statCerrados">—</div>
      <div class="stat-label">Cerrados</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statRemitidos">—</div>
      <div class="stat-label">Remitidos</div>
    </div>
  </div>

  <!-- Notificaciones -->
  <div class="notif-panel">
    <h2>🔔 Notificaciones recientes</h2>
    <div class="notif-list" id="notificaciones"></div>
  </div>

  <!-- Informe consolidado -->
  <div class="card">
    <h2>📊 Informe consolidado de casos</h2>

    <div class="filtros">
      <input type="text" id="fEstudiante" placeholder="🔍 Estudiante..." oninput="aplicarFiltros()">
      <input type="text" id="fMateria"    placeholder="🔍 Materia..."   oninput="aplicarFiltros()">
      <input type="text" id="fDocente"    placeholder="🔍 Docente..."   oninput="aplicarFiltros()">
      <select id="fEstado" onchange="aplicarFiltros()">
        <option value="">Todos los estados</option>
        <option value="Reportado">Reportado</option>
        <option value="En revisión">En revisión</option>
        <option value="En seguimiento">En seguimiento</option>
        <option value="Remitido">Remitido</option>
        <option value="Cerrado">Cerrado</option>
      </select>
      <select id="fMotivo" onchange="aplicarFiltros()">
        <option value="">Todos los motivos</option>
        <option value="Bajo rendimiento">Bajo rendimiento</option>
        <option value="Inasistencia">Inasistencia</option>
        <option value="Seguimiento">Seguimiento</option>
      </select>
      <div class="filtros-actions">
        <button class="btn btn-secondary" onclick="limpiarFiltros()">Limpiar</button>
        <button class="btn btn-primary" onclick="exportarCSV()">⬇ Exportar CSV</button>
      </div>
    </div>

    <div class="tabla-wrapper">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Estudiante</th>
            <th>Materia</th>
            <th>Docente</th>
            <th>Motivo</th>
            <th>Estado</th>
            <th>Fecha</th>
            <th>Detalle</th>
          </tr>
        </thead>
        <tbody id="tbodyReportes"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- Modal detalle -->
<div class="modal-bg" id="modalDetalle">
  <div class="modal">
    <h3>📄 Detalle del reporte</h3>
    <div class="detalle-grid" id="detalleContenido"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="cerrarModal()">Cerrar</button>
    </div>
  </div>
</div>

<script>
  const nombreUsuario = localStorage.getItem("nombreUsuario") || "Decano/a";
  document.getElementById("nombreHeader").textContent = "Bienvenido/a: " + nombreUsuario;

  function cerrarSesion() {
    localStorage.removeItem("nombreUsuario");
    localStorage.removeItem("rolUsuario");
  }

  function obtenerReportes() {
    return JSON.parse(localStorage.getItem("reportes")) || [];
  }

  let todos = [];

  function init() {
    todos = obtenerReportes();
    renderNotificaciones();
    renderTabla(todos);
    actualizarStats(todos);
  }

  function actualizarStats(r) {
    document.getElementById("statTotal").textContent     = r.length;
    document.getElementById("statNuevos").textContent    = r.filter(x => x.estado === "Reportado").length;
    document.getElementById("statEnProceso").textContent = r.filter(x => ["En revisión","En seguimiento"].includes(x.estado)).length;
    document.getElementById("statCerrados").textContent  = r.filter(x => x.estado === "Cerrado").length;
    document.getElementById("statRemitidos").textContent = r.filter(x => x.estado === "Remitido").length;
  }

  function renderNotificaciones() {
    const el = document.getElementById("notificaciones");
    const items = todos.filter(r => r.estado === "Reportado" || r.estado === "Cerrado").slice(-8).reverse();
    if (items.length === 0) {
      el.innerHTML = `<span class="notif-vacia">Sin notificaciones nuevas.</span>`;
      return;
    }
    el.innerHTML = items.map(r => {
      const esNuevo = r.estado === "Reportado";
      return `<div class="notif-item ${esNuevo ? 'notif-nuevo' : 'notif-cerrado'}">
        <span class="notif-dot ${esNuevo ? 'dot-nuevo' : 'dot-cerrado'}"></span>
        ${esNuevo ? '📥 Nuevo caso:' : '✅ Caso cerrado:'} 
        <strong>${r.estudiante}</strong> — ${r.materia}
        <span style="margin-left:auto;font-size:0.78rem;opacity:0.7">${r.fecha||''}</span>
      </div>`;
    }).join("");
  }

  function renderTabla(datos) {
    const tbody = document.getElementById("tbodyReportes");
    if (datos.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:#aaa;padding:24px;">
        No se encontraron reportes.</td></tr>`;
      return;
    }
    tbody.innerHTML = datos.map((r, i) => {
      const badgeClass = {
        "Reportado":"badge-reportado","En revisión":"badge-revision",
        "En seguimiento":"badge-seguimiento","Remitido":"badge-remitido","Cerrado":"badge-cerrado"
      }[r.estado] || "badge-reportado";
      return `<tr>
        <td>${i+1}</td>
        <td><strong>${r.estudiante}</strong></td>
        <td>${r.materia}</td>
        <td>${r.docente || "N/A"}</td>
        <td>${r.motivo}</td>
        <td><span class="badge ${badgeClass}">${r.estado}</span></td>
        <td style="font-size:0.8rem;color:#888">${r.fecha||''}</td>
        <td><button class="btn btn-secondary" style="padding:4px 12px;font-size:0.8rem"
          onclick='verDetalle(${JSON.stringify(r)})'>Ver</button></td>
      </tr>`;
    }).join("");
  }

  function aplicarFiltros() {
    const est  = document.getElementById("fEstudiante").value.toLowerCase();
    const mat  = document.getElementById("fMateria").value.toLowerCase();
    const doc  = document.getElementById("fDocente").value.toLowerCase();
    const est2 = document.getElementById("fEstado").value;
    const mot  = document.getElementById("fMotivo").value;
    const filtrados = todos.filter(r =>
      (!est  || r.estudiante?.toLowerCase().includes(est)) &&
      (!mat  || r.materia?.toLowerCase().includes(mat)) &&
      (!doc  || (r.docente||"").toLowerCase().includes(doc)) &&
      (!est2 || r.estado === est2) &&
      (!mot  || r.motivo === mot)
    );
    renderTabla(filtrados);
    actualizarStats(filtrados);
  }

<script src="api.js"></script>
<script>
// ── Datos de sesión ──
const _sesion = API.sesion.obtener();
document.getElementById("nombreHeader").textContent =
  "Bienvenido/a: " + (_sesion?.nombre || "Decano/a");

function cerrarSesion() { API.sesion.cerrar(); }

// ── Cargar reportes desde la BD ──
let todos = [];

async function init() {
  try {
    todos = await API.reportes.listar();
    renderNotificaciones();
    renderTabla(todos);
    actualizarStats(todos);
  } catch(e) {
    console.error("Error cargando reportes:", e);
  }
}

init();
</script>
</body>
</html>
