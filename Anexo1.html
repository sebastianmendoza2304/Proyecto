<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Panel</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
        <meta name="description" content="Página web sistema de alertas UNILIBRE."> 
        <meta name="keywords" content="HTML, metadatos, SEO">
    </head>
        <link rel="stylesheet" href="Style.css">
    </head>
    <body>
        <h2>Sistema de Alertas</h2>
        <div id="contenido"></div>
        <h2>Panel Principal</h2>
        <div id="estadisticas"></div>
        <div id="contenido"></div>
        <script>
        const rol = localStorage.getItem("rol");
        const usuarioNombre = localStorage.getItem("usuarioNombre");
        const estudiantes = [
            let Estudiantes = JSON.parse(localStorage.getItem("estudiantes")) || [
                {
                    documento:"1001",
                    nombre:"Laura Gómez",
                    carrera:"Ingeniería de Sistemas",
                    telefono:"3001234567",
                    correo:"laura@correo.com",
                    estado:"Sin proceso",
                    remision:"Ninguna",
                    observaciones:[],
                    reportes:[],
                }
            ];
            localStorage.setItem("estudiantes", JSON.stringify(estudiantes));
            const contenido = document.getElementById("contenido");
            if(rol === "docente"){
                contenido.innerHTML = `
                <h3>Panel Docente</h3>
                <input type="text" id="buscar" placeholder="Documento estudiante">
                <button onclick="buscarDocente()">Buscar</button>
                <div id="resultado"></div>
                `;
            }
            else if(rol === "bienestar"){
                contenido.innerHTML = `
                <h3>Panel Bienestar</h3>
                <input type="text" id="buscar" placeholder="Documento estudiante">
                <button onclick="buscarBienestar()">Buscar</button>
                <div id="resultado"></div>
                `;
            }
            else{
                contenido.innerHTML = "Acceso no autorizado";
            }
            // 🔹 FUNCIONES DOCENTE
            function buscarDocente(){
                const doc = buscar.value;
                const est = estudiantes.find(e => e.documento === doc);
                if(est){
                    resultado.innerHTML = `
                    <p><strong>Nombre:</strong> ${est.nombre}</p>
                    <p><strong>Carrera:</strong> ${est.carrera}</p>
                    <p><strong>Teléfono:</strong> ${est.telefono}</p>
                    <p><strong>Correo:</strong> ${est.correo}</p>
                    <p><strong>Estado:</strong> ${est.estado}</p>
                    <p><strong>Remisión:</strong> ${est.remision}</p>
                    <textarea id="obs" placeholder="Agregar observación o novedad"></textarea>
                    <br><br>
                    <button onclick="agregarObservacion('${est.documento}')">Guardar Observación</button>
                    <button onclick="reportar('${est.documento}')">Reportar</button>
                    <h4>Historial:</h4>
                    <p>${est.observaciones.join("<br>") || "Sin registros"}</p>
                    `;
                }
            }
            // 🔹 FUNCIONES BIENESTAR
            function buscarBienestar(){
                const doc = buscar.value;
                const est = estudiantes.find(e => e.documento === doc);
                if(est){
                    resultado.innerHTML = `
                    <p><strong>Nombre:</strong> ${est.nombre}</p>
                    <p><strong>Carrera:</strong> ${est.carrera}</p>
                    <p><strong>Teléfono:</strong> ${est.telefono}</p>
                    <p><strong>Correo:</strong> ${est.correo}</p>
                    <h4>Estado del proceso:</h4>
                    <select onchange="cambiarEstado('${est.documento}', this.value)">
                        <option ${est.estado==="Sin proceso"?"selected":""}>Sin proceso</option>
                        <option ${est.estado==="En seguimiento"?"selected":""}>En seguimiento</option>
                        <option ${est.estado==="Citado"?"selected":""}>Citado</option>
                        <option ${est.estado==="En intervención"?"selected":""}>En intervención</option>
                        <option ${est.estado==="Cerrado"?"selected":""}>Cerrado</option>
                        </select>
                        <h4>Remitir a dependencia:</h4>
                        <select onchange="remitir('${est.documento}', this.value)">
                            <option ${est.remision==="Ninguna"?"selected":""}>Ninguna</option>
                            <option>Psicología</option>
                            <option>Trabajo Social</option>
                            <option>Coordinación Académica</option>
                            </select>
                            <textarea id="obsBienestar" placeholder="Agregar observación"></textarea>
                            <br>
                            <br>
                            <button onclick="agregarObservacion('${est.documento}')">Guardar Observación</button>
                            <h4>Reportes Docentes:</h4>
                            <p>${est.reportes.join("<br>") || "Sin reportes"}</p>
                            <h4>Historial:</h4>
                            <p>${est.observaciones.join("<br>") || "Sin registros"}</p>
                            `;
                        }
                    }
                    // 🔹 ACCIONES GENERALES
                    function agregarObservacion(doc){
                        const est = estudiantes.find(e => e.documento === doc);
                        const texto = document.querySelector("textarea").value;
                        const fecha = new Date().toLocaleString();
                        est.observaciones.push(`${fecha} - ${usuarioNombre}: ${texto}`);
                        alert("Observación agregada");
                    }
                    function reportar(doc){
                        const est = estudiantes.find(e => e.documento === doc);
                        const fecha = new Date().toLocaleString();
                        est.reportes.push(`${fecha} - Reportado por ${usuarioNombre}`);
                        est.estado = "Reportado";
                        alert("Estudiante reportado");
                    }
                    function cambiarEstado(doc, nuevoEstado){
                        const est = estudiantes.find(e => e.documento === doc);
                        est.estado = nuevoEstado;
                    }
                    function remitir(doc, dependencia){
                        const est = estudiantes.find(e => e.documento === doc);
                        est.remision = dependencia;
                    }
                    </script>
                    </body>
                    </html>
