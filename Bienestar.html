<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Bienestar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <h2>Panel Bienestar</h2>
  </div>

  <div class="login-container" style="width:700px;">
    <h3>Actualizar Estado del Caso</h3>
    <form onsubmit="actualizarEstadoBienestar(
      document.getElementById('idReporte').value,
      document.getElementById('estado').value
    ); return false;">
      <label>ID del Reporte:</label>
      <input type="text" id="idReporte" required>
      <label>Nuevo Estado:</label>
      <select id="estado">
        <option value="En seguimiento">En seguimiento</option>
        <option value="Cerrado">Cerrado</option>
      </select>
      <button type="submit">Actualizar Caso</button>
    </form>
  </div>

  <div class="login-container" style="width:700px;">
    <h3>Registrar Seguimiento</h3>
    <form onsubmit="registrarSeguimiento(
      document.getElementById('idReporteSeg').value,
      document.getElementById('intervencion').value,
      document.getElementById('observaciones').value,
      document.getElementById('recomendaciones').value,
      localStorage.getItem('nombreUsuario')
    ); return false;">
      <label>ID del Reporte:</label>
      <input type="text" id="idReporteSeg" required>
      <label>Tipo de intervención:</label>
      <input type="text" id="intervencion" required>
      <label>Observaciones:</label>
      <textarea id="observaciones"></textarea>
      <label>Recomendaciones:</label>
      <textarea id="recomendaciones"></textarea>
      <button type="submit">Registrar Seguimiento</button>
    </form>
  </div>

  <a href="index.html">Cerrar sesión</a>

  <script src="bienestar.js"></script>
</body>
</html>
