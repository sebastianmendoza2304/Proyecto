<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Bienestar - Sistema de Alertas</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; }
 
    .header { display:flex; align-items:center; gap:16px; justify-content:center;
      background: linear-gradient(135deg,#ab1313,#f57c00); color:#fff; padding:16px 24px; }
    .header img { width:54px; height:54px; border-radius:50%; border:2px solid rgba(255,255,255,0.5); }
    .header-info h1 { margin:0; font-size:1.2rem; font-weight:600; }
    .header-info p  { margin:0; font-size:0.82rem; opacity:0.85; }
    .header-right { margin-left:auto; }
    .btn-logout { background:rgba(255,255,255,0.18); color:#fff; border:1px solid rgba(255,255,255,0.4);
      padding:7px 16px; border-radius:6px; cursor:pointer; font-size:0.85rem; text-decoration:none; }
 
    .main { max-width:1100px; margin:28px auto; padding:0 16px; }
 
    .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:24px; }
    .stat-card { background:#fff; border-radius:10px; padding:16px 12px; text-align:center; box-shadow:0 1px 4px rgba(0,0,0,0.08); }
    .stat-num { font-size:2rem; font-weight:700; color:#b71c1c; }
    .stat-label { font-size:0.78rem; color:#888; margin-top:2px; }
 
    .tabs { display:flex; gap:4px; margin-bottom:24px; border-bottom:2px solid #e0e0e0; }
    .tab { padding:10px 22px; cursor:pointer; border-radius:8px 8px 0 0; font-size:0.9rem;
      font-weight:600; color:#777; background:none; border:none; border-bottom:2px solid transparent;
      margin-bottom:-2px; transition:all 0.2s; }
    .tab.active { color:#b71c1c; border-bottom-color:#b71c1c; background:#fff3e0; }
    .tab:hover:not(.active) { color:#b71c1c; background:#fafafa; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
 
    .card { background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,0.09); padding:24px; margin-bottom:20px; }
    .card h2 { margin:0 0 18px; font-size:1.05rem; color:#b71c1c; border-left:4px solid #f57c00; padding-left:10px; }
 
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .form-grid .full { grid-column:1/-1; }
    .form-group { display:flex; flex-direction:column; gap:5px; }
    .form-group label { font-size:0.82rem; font-weight:600; color:#555; text-transform:uppercase; letter-spacing:0.03em; }
    .form-group input,
    .form-group select,
    .form-group textarea { padding:9px 12px; border:1.5px solid #ddd; border-radius:7px;
      font-size:0.92rem; font-family:inherit; transition:border-color 0.2s; background:#fafafa; }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { outline:none; border-color:#b71c1c; background:#fff; }
    .form-group textarea { resize:vertical; min-height:80px; }
    .form-actions { display:flex; gap:10px; margin-top:18px; }
 
    .btn { padding:10px 20px; border:none; border-radius:7px; cursor:pointer;
      font-weight:600; font-size:0.9rem; font-family:inherit; transition:all 0.2s; }
    .btn-primary { background:#b71c1c; color:#fff; }
    .btn-primary:hover { background:#f57c00; }
    .btn-secondary { background:#f5f5f5; color:#555; border:1.5px solid #ddd; }
    .btn-secondary:hover { background:#ffe0b2; border-color:#f57c00; }
    .btn-sm { padding:5px 12px; font-size:0.8rem; border-radius:5px; }
 
    .msg { padding:11px 16px; border-radius:7px; font-size:0.88rem; font-weight:500; display:none; margin-bottom:14px; }
    .msg.success { background:#e8f5e9; color:#2e7d32; border:1px solid #a5d6a7; display:block; }
    .msg.error   { background:#ffebee; color:#c62828; border:1px solid #ef9a9a; display:block; }
 
    .search-bar { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
    .search-bar input,
    .search-bar select { padding:8px 12px; border:1.5px solid #ddd; border-radius:7px;
      font-size:0.88rem; font-family:inherit; background:#fafafa; flex:1; min-width:140px; }
    .search-bar input:focus,
    .search-bar select:focus { outline:none; border-color:#b71c1c; }
 
    .tabla-wrapper { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:0.88rem; }
    thead tr { background:linear-gradient(135deg,#b71c1c,#f57c00); color:#fff; }
    th { padding:11px 14px; text-align:left; font-weight:600; font-size:0.78rem; text-transform:uppercase; letter-spacing:0.04em; }
    td { padding:11px 14px; border-bottom:1px solid #f0f0f0; color:#444; vertical-align:middle; }
    tr:hover td { background:#fff8f0; }
    .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:0.75rem; font-weight:600; }
    .badge-reportado    { background:#fff3cd; color:#856404; }
    .badge-revision     { background:#cce5ff; color:#004085; }
    .badge-seguimiento  { background:#d4edda; color:#155724; }
    .badge-remitido     { background:#f8d7da; color:#721c24; }
    .badge-cerrado      { background:#e2e3e5; color:#383d41; }
 
    .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:100;
      align-items:center; justify-content:center; }
    .modal-bg.open { display:flex; }
    .modal { background:#fff; border-radius:14px; padding:28px; width:100%; max-width:600px;
      box-shadow:0 8px 32px rgba(0,0,0,0.18); max-height:92vh; overflow-y:auto; }
    .modal h3 { margin:0 0 4px; color:#b71c1c; font-size:1rem; }
    .modal-sub { font-size:0.82rem; color:#888; margin-bottom:18px; }
    .modal-actions { margin-top:18px; display:flex; justify-content:flex-end; gap:10px; }
 
    .caso-info { background:#fff8f0; border:1px solid #ffe0b2; border-radius:8px; padding:14px; margin-bottom:18px; }
    .caso-info p { margin:4px 0; font-size:0.88rem; color:#555; }
    .caso-info strong { color:#b71c1c; }
 
    @media(max-width:600px) { .form-grid { grid-template-columns:1fr; } .tabs { overflow-x:auto; } }
  </style>
</head>
<body>
 
<div class="header">
  <img src="escudo-unilibre.png" alt="Universidad Libre">
  <div class="header-info">
    <h1>Panel Bienestar Universitario</h1>
    <p id="nombreHeader">Sistema de Alertas Académicas</p>
  </div>
  <div class="header-right">
    <a href="Index.html" class="btn-logout" onclick="cerrarSesion()">Cerrar sesión</a>
  </div>
</div>
 
<div class="main">
 
  <div class="stats">
    <div class="stat-card"><div class="stat-num" id="statTotal">—</div><div class="stat-label">Total casos</div></div>
    <div class="stat-card"><div class="stat-num" id="statPendientes">—</div><div class="stat-label">Pendientes</div></div>
    <div class="stat-card"><div class="stat-num" id="statEnProceso">—</div><div class="stat-label">En proceso</div></div>
    <div class="stat-card"><div class="stat-num" id="statCerrados">—</div><div class="stat-label">Cerrados</div></div>
  </div>
 
  <div class="tabs">
    <button class="tab active" onclick="cambiarTab('casos', this)">📋 Casos asignados</button>
    <button class="tab" onclick="cambiarTab('seguimiento', this)">📝 Registrar seguimiento</button>
  </div>
 
  <!-- TAB: Casos -->
  <div id="tab-casos" class="tab-panel active">
    <div class="card">
      <h2>Casos activos</h2>
      <div id="msgCasos" class="msg"></div>
      <div class="search-bar">
        <input type="text" id="buscarEst" placeholder="🔍 Estudiante..." oninput="filtrarCasos()">
        <input type="text" id="buscarMat" placeholder="🔍 Materia..."   oninput="filtrarCasos()">
        <select id="filtroEst" onchange="filtrarCasos()">
          <option value="">Todos los estados</option>
          <option value="Reportado">Reportado</option>
          <option value="En revisión">En revisión</option>
          <option value="En seguimiento">En seguimiento</option>
          <option value="Cerrado">Cerrado</option>
        </select>
      </div>
      <div class="tabla-wrapper">
        <table>
          <thead><tr>
            <th>#</th><th>Estudiante</th><th>Materia</th>
            <th>Motivo</th><th>Estado</th><th>Fecha</th><th>Acción</th>
          </tr></thead>
          <tbody id="tbodyCasos"></tbody>
        </table>
      </div>
    </div>
  </div>
 
  <!-- TAB: Seguimiento -->
  <div id="tab-seguimiento" class="tab-panel">
    <div class="card">
      <h2>Registrar seguimiento a un caso</h2>
      <div id="msgSeg" class="msg"></div>
      <form id="formSeguimiento" onsubmit="registrarSeguimiento(event)">
        <div class="form-grid">
          <div class="form-group full">
            <label>ID del reporte</label>
            <div style="display:flex;gap:10px">
              <input type="number" id="segId" placeholder="Ingresa el ID del reporte" min="1" required style="flex:1">
              <button type="button" class="btn btn-secondary" onclick="buscarCaso()">Buscar</button>
            </div>
          </div>
        </div>
        <div id="infoCaso" class="caso-info" style="display:none"></div>
 
        <div class="form-grid">
          <div class="form-group">
            <label>Tipo de intervención</label>
            <select id="segIntervencion">
              <option value="Orientación psicológica">Orientación psicológica</option>
              <option value="Apoyo académico">Apoyo académico</option>
              <option value="Apoyo económico">Apoyo económico</option>
              <option value="Seguimiento familiar">Seguimiento familiar</option>
              <option value="Otro">Otro</option>
            </select>
          </div>
          <div class="form-group">
            <label>Nuevo estado del caso</label>
            <select id="segEstado">
              <option value="En revisión">En revisión</option>
              <option value="En seguimiento" selected>En seguimiento</option>
              <option value="Cerrado">Cerrado</option>
            </select>
          </div>
          <div class="form-group full">
            <label>Observaciones</label>
            <textarea id="segObservaciones" placeholder="Descripción de la intervención realizada..."></textarea>
          </div>
          <div class="form-group full">
            <label>Recomendaciones</label>
            <textarea id="segRecomendaciones" placeholder="Acciones a seguir, recursos sugeridos..."></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Guardar seguimiento</button>
          <button type="button" class="btn btn-secondary" onclick="limpiarSeg()">Limpiar</button>
        </div>
      </form>
    </div>
  </div>
 
</div>
 
<!-- Modal gestión rápida -->
<div class="modal-bg" id="modalGestion">
  <div class="modal">
    <h3>⚙️ Gestionar caso</h3>
    <p class="modal-sub" id="modalSubtitle"></p>
    <div id="infoCasoModal" class="caso-info"></div>
    <div class="form-grid">
      <input type="hidden" id="modalIdx">
      <div class="form-group">
        <label>Nuevo estado</label>
        <select id="modalEstado">
          <option value="En revisión">En revisión</option>
          <option value="En seguimiento">En seguimiento</option>
          <option value="Cerrado">Cerrado</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tipo de intervención</label>
        <select id="modalIntervencion">
          <option value="Orientación psicológica">Orientación psicológica</option>
          <option value="Apoyo académico">Apoyo académico</option>
          <option value="Apoyo económico">Apoyo económico</option>
          <option value="Seguimiento familiar">Seguimiento familiar</option>
          <option value="Otro">Otro</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Observaciones</label>
        <textarea id="modalObservaciones" placeholder="Notas del caso..."></textarea>
      </div>
      <div class="form-group full">
        <label>Recomendaciones</label>
        <textarea id="modalRecomendaciones" placeholder="Acciones a seguir..."></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarGestion()">Guardar</button>
    </div>
  </div>
</div>
 
<script src="bienestar.js"></script>
</body>
</html>
