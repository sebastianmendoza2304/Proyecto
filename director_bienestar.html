<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Director de Bienestar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <img src="escudo-unilibre.png" alt="Escudo Universidad Libre de Colombia" class="logo">
    <h2>Panel Director de Bienestar</h2>
  </div>

  <!-- Actualizar estado -->
  <div class="login-container" style="width:700px;">
    <h3>Actualizar Estado del Caso</h3>
    <form id="formEstado">
      <label>ID del Reporte:</label>
      <input type="text" id="idReporte" required>

      <label>Nuevo Estado:</label>
      <select id="estado">
        <option value="En revisión">En revisión</option>
        <option value="En seguimiento">En seguimiento</option>
        <option value="Remitido">Remitido</option>
        <option value="Cerrado">Cerrado</option>
      </select>

      <label>Remitido a:</label>
      <input type="text" id="remitido">

      <label>Motivo de la remisión:</label>
      <textarea id="motivo" rows="3"></textarea>

      <button type="submit">Actualizar Caso</button>
    </form>
  </div>

  <!-- Consultar reportes -->
  <div class="login-container" style="width:700px;">
    <h3>Consultar Reportes</h3>
    <form id="formConsulta">
      <label>Fecha:</label>
      <input type="date" id="fecha">
      <label>Programa Académico:</label>
      <input type="text" id="programa">
      <label>Periodo Académico:</label>
      <input type="text" id="periodo">
      <label>Estado:</label>
      <select id="estadoConsulta">
        <option value="">Todos</option>
        <option value="Reportado">Reportado</option>
        <option value="En revisión">En revisión</option>
        <option value="En seguimiento">En seguimiento</option>
        <option value="Remitido">Remitido</option>
        <option value="Cerrado">Cerrado</option>
      </select>
      <button type="submit">Filtrar</button>
    </form>

    <table border="1" width="100%" id="tablaReportes">
      <tr>
        <th>ID</th>
        <th>Estudiante</th>
        <th>Materia</th>
        <th>Docente</th>
        <th>Estado</th>
        <th>Fecha</th>
      </tr>
    </table>
  </div>

  <a href="index.html" class="volver">Cerrar sesión</a>

  <script>
    // Simulación con localStorage
    let reportes = JSON.parse(localStorage.getItem("reportes")) || [];

    const tabla = document.getElementById("tablaReportes");
    function mostrarReportes(lista) {
      tabla.innerHTML = `
        <tr>
          <th>ID</th>
          <th>Estudiante</th>
          <th>Materia</th>
          <th>Docente</th>
          <th>Estado</th>
          <th>Fecha</th>
        </tr>`;
      lista.forEach((r, i) => {
        const fila = document.createElement("tr");
        fila.innerHTML = `
          <td>${i+1}</td>
          <td>${r.estudiante}</td>
          <td>${r.materia}</td>
          <td>${r.docente || "N/A"}</td>
          <td>${r.estado}</td>
          <td>${r.fecha}</td>
        `;
        tabla.appendChild(fila);
      });
    }
    mostrarReportes(reportes);

    // Actualizar estado
    document.getElementById("formEstado").addEventListener("submit", e => {
      e.preventDefault();
      const id = parseInt(document.getElementById("idReporte").value) - 1;
      if(reportes[id]) {
        reportes[id].estado = document.getElementById("estado").value;
        reportes[id].remitido = document.getElementById("remitido").value;
        reportes[id].motivo = document.getElementById("motivo").value;
        localStorage.setItem("reportes", JSON.stringify(reportes));
        mostrarReportes(reportes);
        alert("Caso actualizado correctamente.");
      } else {
        alert("ID de reporte no encontrado.");
      }
    });

    // Filtrar reportes
    document.getElementById("formConsulta").addEventListener("submit", e => {
      e.preventDefault();
      const estado = document.getElementById("estadoConsulta").value;
      let filtrados = reportes;
      if(estado) filtrados = filtrados.filter(r => r.estado === estado);
      mostrarReportes(filtrados);
    });
  </script>
</body>
</html>
