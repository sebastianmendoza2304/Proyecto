<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Administrador</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <h2>Panel Administrador</h2>
  </div>

  <!-- Registro de usuarios -->
  <div class="login-container" style="width:700px;">
    <h3>Registrar Usuario</h3>
    <form onsubmit="registrarUsuario(
      document.getElementById('tipoUsuario').value,
      {
        nombre: document.getElementById('nombreUsuario').value,
        password: document.getElementById('passwordUsuario').value,
        correo: document.getElementById('correoUsuario').value
      }
    ); return false;">
      <label>Tipo de Usuario:</label>
      <select id="tipoUsuario">
        <option value="administrador">Administrador</option>
        <option value="docente">Docente</option>
        <option value="bienestar">Bienestar</option>
        <option value="director_bienestar">Director de Bienestar</option>
        <option value="decanatura">Decanatura</option>
      </select>

      <label>Nombre de Usuario:</label>
      <input type="text" id="nombreUsuario" required>

      <label>Contraseña:</label>
      <input type="password" id="passwordUsuario" required>

      <label>Correo Institucional:</label>
      <input type="email" id="correoUsuario">

      <button type="submit">Registrar Usuario</button>
    </form>
  </div>

  <!-- Registro de estudiantes -->
  <div class="login-container" style="width:700px;">
    <h3>Registrar Estudiante</h3>
    <form onsubmit="registrarUsuario(
      'estudiante',
      {
        documento: document.getElementById('documentoEst').value,
        nombres: document.getElementById('nombresEst').value,
        apellidos: document.getElementById('apellidosEst').value,
        carrera: document.getElementById('carreraEst').value,
        telefono: document.getElementById('telefonoEst').value,
        correo: document.getElementById('correoEst').value,
        periodo: document.getElementById('periodoEst').value
      }
    ); return false;">
      <label>Documento:</label>
      <input type="text" id="documentoEst" required>

      <label>Nombres:</label>
      <input type="text" id="nombresEst" required>

      <label>Apellidos:</label>
      <input type="text" id="apellidosEst" required>

      <label>Carrera:</label>
      <input type="text" id="carreraEst" required>

      <label>Teléfono:</label>
      <input type="text" id="telefonoEst">

      <label>Correo:</label>
      <input type="email" id="correoEst">

      <label>Periodo Académico:</label>
      <input type="text" id="periodoEst">

      <button type="submit">Registrar Estudiante</button>
    </form>
  </div>

  <a href="index.html">Cerrar sesión</a>

  <script src="admin.js"></script>
</body>
</html>
